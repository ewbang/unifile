version: '3.8'

services:
  unifile:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: unifile
    ports:
      - "8080:80"
    volumes:
      # 持久化数据库和备份
      - unifile-data:/root/.unifile
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  unifile-data:
    driver: local